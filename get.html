<!DOCTYPE html>
<html>
<head>
  <title>Account Details</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #eef2ff, #f8fafc);
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e293b;
    }

    table {
      width: 80%;
      margin: auto;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    th {
      background: #2563eb;
      color: white;
      padding: 14px;
      text-transform: uppercase;
      font-size: 13px;
    }

    td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
      color: #334155;
    }

    tr:hover {
      background: #f1f5f9;
    }

    @media (max-width: 768px) {
      table {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<h2>Account  Details</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Account No</th>
      <th>Start Date</th>
      <th>End Date</th>
      <th>Plan</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
fetch("https://script.google.com/macros/s/AKfycbzv4ytZz4u-xz1GFJI7r87DvS_6MtV8gyNR1rUpcRlCsQ38sNR1oS3fKfyfd28PU8n2/exec")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(r => {
      html += `
        <tr>
          <td>${r.Name}</td>
          <td>${r["Account Number"]}</td>
          <td>${r["Start Date"]}</td>
          <td>${r["End Date"]}</td>
          <td>${r.Plan}</td>
        </tr>`;
    });
    document.getElementById("data").innerHTML = html;
  });
</script>

</body>
</html>
