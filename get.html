<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Details</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #eef2ff, #f8fafc);
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e293b;
    }

    table {
      width: 80%;
      margin: auto;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    th {
      background: #2563eb;
      color: white;
      padding: 14px;
      text-transform: uppercase;
      font-size: 13px;
    }

    td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
      color: #334155;
    }

    tr:hover {
      background: #f1f5f9;
    }

    /* New style for expired accounts */
    .expired {
      background-color: #fee2e2 !important; /* Soft light red background */
    }
    
    .expired td {
      color: #dc2626 !important; /* Bold red text */
      font-weight: 600;
    }

    .expired:hover {
      background: #fca5a5 !important; /* Darker red on hover */
    }

    @media (max-width: 768px) {
      table {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<h2>Account Details</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Account No</th>
      <th>Start Date</th>
      <th>End Date</th>
      <th>Plan</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
// Get today's date set to midnight for clean calculations
const today = new Date();
today.setHours(0, 0, 0, 0);

fetch("https://script.google.com/macros/s/AKfycbzv4ytZz4u-xz1GFJI7r87DvS_6MtV8gyNR1rUpcRlCsQ38sNR1oS3fKfyfd28PU8n2/exec")
  .then(res => res.json())
  .then(data => {
    // Sort data in ascending order based on Start Date
    data.sort((a, b) => new Date(a["Start Date"]) - new Date(b["Start Date"]));

    let html = "";
    
    data.forEach(r => {
      // Parse the End Date from the spreadsheet row
      const endDate = new Date(r["End Date"]);
      
      // Check if the plan is expired (End Date is less than or equal to today)
      let rowClass = "";
      if (!isNaN(endDate.getTime()) && endDate <= today) {
        rowClass = 'class="expired"';
      }

      html += `
        <tr ${rowClass}>
          <td>${r.Name}</td>
          <td>${r["Account Number"]}</td>
          <td>${r["Start Date"]}</td>
          <td>${r["End Date"]}</td>
          <td>${r.Plan}</td>
        </tr>`;
    });
    document.getElementById("data").innerHTML = html;
  })
  .catch(err => console.error("Error fetching data: ", err));
</script>

</body>
</html>
